<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Phylogeny Lab</title>
  
  <!-- Tailwind CSS for styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Babel to compile React JSX in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Tailwind Configuration for custom print settings -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          screens: {
            'print': {'raw': 'print'},
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-900">
  <div id="root"></div>

  <!-- The React Application -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect } from 'https://esm.sh/react@18';
    import { createRoot } from 'https://esm.sh/react-dom@18/client';
    import { RefreshCw, CheckCircle, ShieldAlert, Dna, Info, Flame, Biohazard, BookOpen, GitBranch, Split, ArrowRight, Printer } from 'https://esm.sh/lucide-react@0.294.0';

    // --- SCENARIO CONFIGURATIONS ---
    const SCENARIOS = {
      classic: {
        id: 'classic',
        icon: Dna,
        title: 'Level 1: The Classic Lab',
        themeColor: 'cyan',
        description: 'The original assignment. Group these familiar taxa based on their shared derived characteristics.',
        organisms: ['Bullfrog', 'Human', 'Kangaroo', 'Shark'],
        traits: ['Mammary glands', 'Placenta', 'Two pairs of limbs', 'Vertebrae'],
        matrix: [
          { trait: 'Vertebrae', vals: ['X', 'X', 'X', 'X'] },
          { trait: 'Two pairs of limbs', vals: ['', 'X', 'X', 'X'] },
          { trait: 'Mammary glands', vals: ['', '', 'X', 'X'] },
          { trait: 'Placenta', vals: ['', '', '', 'X'] }
        ],
        correctOrgs: ['Shark', 'Bullfrog', 'Kangaroo', 'Human'],
        correctTraits: ['Vertebrae', 'Two pairs of limbs', 'Mammary glands', 'Placenta']
      },
      mythological: {
        id: 'mythological',
        icon: Flame,
        title: 'Level 2: Mythological Taxonomy',
        themeColor: 'orange',
        description: 'Categorize these mythical beasts. Place the ancestral traits at the bottom and derived magical traits higher up.',
        organisms: ['Centaur', 'Chimera', 'Dragon', 'Goblin', 'Slime'],
        traits: ['Carbon-based Life', 'Fire Breathing', 'Limbs & Bones', 'Magic Affinity', 'Multiple Heads'],
        matrixHeaders: ['Slime', 'Goblin', 'Centaur', 'Dragon', 'Chimera'],
        matrixData: [
          { trait: 'Carbon-based Life', vals: ['X', 'X', 'X', 'X', 'X'] },
          { trait: 'Limbs & Bones',     vals: ['',  'X', 'X', 'X', 'X'] },
          { trait: 'Magic Affinity',    vals: ['',  '',  'X', 'X', 'X'] },
          { trait: 'Fire Breathing',    vals: ['',  '',  '',  'X', 'X'] },
          { trait: 'Multiple Heads',    vals: ['',  '',  '',  '',  'X'] }
        ],
        correctOrgs: ['Slime', 'Goblin', 'Centaur', 'Dragon', 'Chimera'],
        correctTraits: ['Carbon-based Life', 'Limbs & Bones', 'Magic Affinity', 'Fire Breathing', 'Multiple Heads']
      },
      outbreak: {
        id: 'outbreak',
        icon: Biohazard,
        title: 'Level 3: Viral Outbreak',
        themeColor: 'emerald',
        description: 'A virus is rapidly mutating! Trace the phylogeny of the strains to find Patient Zero.',
        organisms: ['Strain Alpha', 'Strain Beta', 'Strain Gamma', 'Strain Delta', 'Strain Epsilon'],
        traits: ['Furin Cleavage', 'Lipid Envelope', 'N-Terminal Mutation', 'RNA Genome', 'Spike Protein'],
        matrixHeaders: ['Alpha', 'Beta', 'Gamma', 'Delta', 'Epsilon'],
        matrixData: [
          { trait: 'RNA Genome',          vals: ['X', 'X', 'X', 'X', 'X'] },
          { trait: 'Lipid Envelope',      vals: ['',  'X', 'X', 'X', 'X'] },
          { trait: 'Spike Protein',       vals: ['',  '',  'X', 'X', 'X'] },
          { trait: 'N-Terminal Mutation', vals: ['',  '',  '',  'X', 'X'] },
          { trait: 'Furin Cleavage',      vals: ['',  '',  '',  '',  'X'] }
        ],
        correctOrgs: ['Strain Alpha', 'Strain Beta', 'Strain Gamma', 'Strain Delta', 'Strain Epsilon'],
        correctTraits: ['RNA Genome', 'Lipid Envelope', 'Spike Protein', 'N-Terminal Mutation', 'Furin Cleavage']
      }
    };

    // --- SVG LAYOUT ENGINE ---
    const LAYOUTS = {
      4: [
        { orgX: 200, orgY: 100, branchY: 336, tickX: 125, tickY: 370, tzX: 50, tzY: 390 },
        { orgX: 375, orgY: 100, branchY: 261, tickX: 290, tickY: 298, tzX: 220, tzY: 320 },
        { orgX: 550, orgY: 100, branchY: 186, tickX: 460, tickY: 226, tzX: 390, tzY: 245 },
        { orgX: 750, orgY: 100, branchY: 100, tickX: 635, tickY: 151, tzX: 560, tzY: 170 },
      ],
      5: [
        { orgX: 180, orgY: 100, branchY: 344, tickX: 110, tickY: 374, tzX: 10, tzY: 395 },
        { orgX: 320, orgY: 100, branchY: 284, tickX: 250, tickY: 314, tzX: 150, tzY: 335 },
        { orgX: 460, orgY: 100, branchY: 224, tickX: 390, tickY: 254, tzX: 290, tzY: 275 },
        { orgX: 600, orgY: 100, branchY: 164, tickX: 530, tickY: 194, tzX: 430, tzY: 215 },
        { orgX: 740, orgY: 100, branchY: 104, tickX: 670, tickY: 134, tzX: 570, tzY: 155 },
      ]
    };

    function App() {
      const [showIntro, setShowIntro] = useState(true);
      const [activeScenarioId, setActiveScenarioId] = useState('classic');
      const scenario = SCENARIOS[activeScenarioId];
      const layout = LAYOUTS[scenario.organisms.length];

      const [placedOrgs, setPlacedOrgs] = useState(Array(scenario.organisms.length).fill(null));
      const [placedTraits, setPlacedTraits] = useState(Array(scenario.traits.length).fill(null));
      const [feedback, setFeedback] = useState(null);
      
      useEffect(() => {
        setPlacedOrgs(Array(SCENARIOS[activeScenarioId].organisms.length).fill(null));
        setPlacedTraits(Array(SCENARIOS[activeScenarioId].traits.length).fill(null));
        setFeedback(null);
      }, [activeScenarioId]);

      const availableOrgs = scenario.organisms.filter(org => !placedOrgs.includes(org));
      const availableTraits = scenario.traits.filter(trait => !placedTraits.includes(trait));

      const handleDragStart = (e, type, value) => {
        e.dataTransfer.setData('application/json', JSON.stringify({ type, value }));
      };

      const handleDrop = (e, targetType, index) => {
        e.preventDefault();
        try {
          const data = JSON.parse(e.dataTransfer.getData('application/json'));
          if (data.type !== targetType) return; 

          if (targetType === 'org') {
            setPlacedOrgs(prev => {
              const newState = [...prev];
              const oldIndex = newState.indexOf(data.value);
              if (oldIndex > -1) newState[oldIndex] = null;
              newState[index] = data.value;
              return newState;
            });
          } else {
            setPlacedTraits(prev => {
              const newState = [...prev];
              const oldIndex = newState.indexOf(data.value);
              if (oldIndex > -1) newState[oldIndex] = null;
              newState[index] = data.value;
              return newState;
            });
          }
          setFeedback(null);
        } catch (err) {
          console.error("Drop error", err);
        }
      };

      const handleDragOver = (e) => e.preventDefault();

      const removePlaced = (type, index) => {
        if (type === 'org') {
          setPlacedOrgs(prev => { const n = [...prev]; n[index] = null; return n; });
        } else {
          setPlacedTraits(prev => { const n = [...prev]; n[index] = null; return n; });
        }
        setFeedback(null);
      };

      const checkAnswers = () => {
        let allFilled = true;
        let allCorrect = true;

        placedOrgs.forEach((org, i) => {
          if (!org) allFilled = false;
          else if (org !== scenario.correctOrgs[i]) allCorrect = false;
        });

        placedTraits.forEach((trait, i) => {
          if (!trait) allFilled = false;
          else if (trait !== scenario.correctTraits[i]) allCorrect = false;
        });

        if (!allFilled) {
          setFeedback({ type: 'warning', message: 'Place all taxa and characters onto the tree before verifying!' });
        } else if (allCorrect) {
          setFeedback({ type: 'success', message: 'Perfect! Evolutionary tree successfully reconstructed!' });
        } else {
          setFeedback({ type: 'error', message: 'The phylogeny is tangled. Check your matrix data and try again.' });
        }
      };

      const resetActivity = () => {
        setPlacedOrgs(Array(scenario.organisms.length).fill(null));
        setPlacedTraits(Array(scenario.traits.length).fill(null));
        setFeedback(null);
      };

      const themeColors = {
        cyan: { text: 'text-cyan-400', bg: 'bg-cyan-500', border: 'border-cyan-500', shadow: 'shadow-cyan-900/50', gradient: 'from-cyan-400 to-blue-500' },
        orange: { text: 'text-orange-400', bg: 'bg-orange-500', border: 'border-orange-500', shadow: 'shadow-orange-900/50', gradient: 'from-orange-400 to-red-500' },
        emerald: { text: 'text-emerald-400', bg: 'bg-emerald-500', border: 'border-emerald-500', shadow: 'shadow-emerald-900/50', gradient: 'from-emerald-400 to-teal-500' }
      };
      const tColor = themeColors[scenario.themeColor];

      if (showIntro) {
        return (
          <>
          <div className="min-h-screen bg-slate-900 text-slate-100 font-sans p-6 md:p-12 flex flex-col items-center justify-center selection:bg-cyan-500/30 print:hidden">
            <div className="max-w-5xl w-full space-y-8 animate-in fade-in duration-700">
              <div className="text-center space-y-4">
                <div className="inline-flex items-center justify-center p-4 bg-cyan-500/20 rounded-full mb-2 border border-cyan-500/30">
                  <GitBranch className="w-12 h-12 text-cyan-400" />
                </div>
                <h1 className="text-4xl md:text-5xl font-bold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">
                  Interactive Phylogeny Lab
                </h1>
                <p className="text-lg text-slate-400 max-w-2xl mx-auto">
                  Before we start building trees, let's understand the science behind them.
                </p>
              </div>

              <div className="grid md:grid-cols-3 gap-6 pt-4">
                <div className="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl flex flex-col">
                  <GitBranch className="w-8 h-8 text-cyan-400 mb-4" />
                  <h3 className="text-xl font-bold mb-2">What is a Cladogram?</h3>
                  <p className="text-slate-400 text-sm leading-relaxed flex-grow">
                    A cladogram is a branching diagram that depicts the evolutionary relationships among groups of organisms (taxa). Think of it as a family tree for species. It shows how closely related different groups are based on when they split from a common ancestor.
                  </p>
                </div>

                <div className="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl flex flex-col">
                  <Dna className="w-8 h-8 text-emerald-400 mb-4" />
                  <h3 className="text-xl font-bold mb-2">How Does it Work?</h3>
                  <p className="text-slate-400 text-sm leading-relaxed flex-grow">
                    Organisms are grouped together based on <strong>shared derived characteristics</strong> (traits that evolved in an ancestor and were passed down). When a new trait appears, the tree branches. The points where branches meet (nodes) represent the last common ancestor of those groups.
                  </p>
                </div>

                <div className="bg-slate-800 p-6 rounded-2xl border border-blue-500/30 shadow-[0_0_15px_rgba(59,130,246,0.15)] relative overflow-hidden flex flex-col">
                  <div className="absolute top-0 right-0 w-24 h-24 bg-blue-500/10 rounded-full blur-2xl transform translate-x-1/2 -translate-y-1/2"></div>
                  <Split className="w-8 h-8 text-blue-400 mb-4 relative z-10" />
                  <h3 className="text-xl font-bold mb-2 relative z-10">Cladogram vs. Dichotomous Key</h3>
                  <p className="text-slate-400 text-sm leading-relaxed relative z-10 flex-grow">
                    A <strong>Dichotomous Key</strong> is an <em>identification</em> tool. It uses yes/no questions about physical features to identify an unknown organism (e.g., "Does it have wings?").<br/><br/>
                    A <strong>Cladogram</strong> is an <em>evolutionary</em> tool. It reveals ancestry. A dolphin and a shark look similar, but a cladogram proves dolphins are closer to humans because they share a more recent mammalian ancestor.
                  </p>
                </div>
              </div>

              <div className="flex justify-center pt-8">
                <button 
                  onClick={() => setShowIntro(false)}
                  className="group flex items-center gap-3 px-8 py-4 bg-cyan-600 hover:bg-cyan-500 text-white font-bold text-lg rounded-xl shadow-lg shadow-cyan-900/50 transition-all hover:-translate-y-1"
                >
                  Start Interactive Lab
                  <ArrowRight className="w-5 h-5 group-hover:translate-x-1 transition-transform" />
                </button>
              </div>
            </div>
          </div>
          <PrintableWorksheet />
          </>
        );
      }

      return (
        <>
        <div className="min-h-screen bg-slate-900 text-slate-100 font-sans p-6 selection:bg-slate-700 print:hidden">
          <header className="max-w-7xl mx-auto mb-8 space-y-6">
            <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 pb-6 border-b border-slate-700">
              <div className="flex items-center gap-4">
                <div className={`p-3 bg-slate-800 rounded-xl border border-slate-700 shadow-lg`}>
                  <scenario.icon className={`${tColor.text} w-8 h-8`} />
                </div>
                <div>
                  <h1 className={`text-3xl font-bold bg-gradient-to-r ${tColor.gradient} bg-clip-text text-transparent`}>
                    Interactive Phylogeny Lab
                  </h1>
                  <p className="text-slate-400 mt-1">
                    Construct cladograms by mapping shared derived characteristics.
                  </p>
                </div>
              </div>
              
              <div className="flex bg-slate-800 p-1.5 rounded-xl border border-slate-700 shadow-inner overflow-x-auto max-w-full">
                <button
                  onClick={() => window.print()}
                  className="px-4 py-2 rounded-lg text-sm font-medium transition-all flex items-center gap-2 text-emerald-400 hover:text-emerald-300 hover:bg-slate-700/50 mr-1 border-r border-slate-700 pr-5"
                  title="Print Lab Sheet"
                >
                  <Printer className="w-4 h-4 shrink-0" />
                  <span className="hidden sm:inline">Print</span>
                </button>
                <button
                  onClick={() => setShowIntro(true)}
                  className="px-4 py-2 rounded-lg text-sm font-medium transition-all flex items-center gap-2 text-slate-400 hover:text-slate-200 hover:bg-slate-700/50 mr-1 border-r border-slate-700 pr-5"
                  title="Read Introduction"
                >
                  <BookOpen className="w-4 h-4 shrink-0" />
                  <span className="hidden sm:inline">Intro</span>
                </button>
                {Object.values(SCENARIOS).map(s => (
                  <button
                    key={s.id}
                    onClick={() => setActiveScenarioId(s.id)}
                    className={`px-4 py-2 rounded-lg text-sm font-medium transition-all flex items-center gap-2 ${activeScenarioId === s.id ? `${tColor.bg} text-white shadow-md` : 'text-slate-400 hover:text-slate-200 hover:bg-slate-700/50'}`}
                  >
                    <s.icon className="w-4 h-4" />
                    <span className="hidden sm:inline">{s.title.split(':')[0]}</span>
                  </button>
                ))}
              </div>
            </div>
          </header>

          <div className="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div className="lg:col-span-4 space-y-6">
              <div className="bg-slate-800 rounded-2xl p-6 border border-slate-700 shadow-xl">
                <h2 className="text-xl font-semibold mb-2 flex items-center gap-2">
                  <Info className={`w-5 h-5 ${tColor.text}`} />
                  {scenario.title}
                </h2>
                <p className="text-sm text-slate-400 mb-6 leading-relaxed">
                  {scenario.description} Use the presence (<span className={`${tColor.text} font-bold`}>X</span>) of traits in the matrix to build your tree.
                </p>

                <div className="overflow-x-auto rounded-lg border border-slate-700 shadow-inner">
                  <table className="w-full text-xs sm:text-sm text-left">
                    <thead className="text-xs uppercase bg-slate-700/50 text-slate-300">
                      <tr>
                        <th className="px-3 py-3">Traits</th>
                        {(scenario.matrixHeaders || scenario.organisms).map(h => (
                          <th key={h} className="px-2 py-3 text-center">{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-700">
                      {(scenario.matrixData || scenario.matrix).map((row, idx) => (
                        <tr key={row.trait} className={idx % 2 === 0 ? 'bg-slate-800/50' : 'bg-slate-800'}>
                          <td className="px-3 py-2.5 font-medium leading-tight">{row.trait}</td>
                          {row.vals.map((val, i) => (
                            <td key={i} className={`px-2 py-2.5 text-center font-bold ${val ? tColor.text : ''}`}>
                              {val}
                            </td>
                          ))}
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>

              <div className="space-y-4">
                <div className="bg-slate-800/80 rounded-2xl p-4 border border-blue-500/30 border-dashed">
                  <h3 className="text-xs font-semibold uppercase text-slate-400 mb-3 tracking-wider">Taxa Bank (Drag these to the top)</h3>
                  <div className="flex flex-wrap gap-2 min-h-[40px]">
                    {availableOrgs.map(org => (
                      <div key={org} draggable onDragStart={(e) => handleDragStart(e, 'org', org)}
                        className="cursor-grab active:cursor-grabbing bg-blue-600 hover:bg-blue-500 text-white px-3 py-1.5 rounded-lg text-sm font-medium shadow-lg transition-transform hover:-translate-y-0.5"
                      >
                        {org}
                      </div>
                    ))}
                    {availableOrgs.length === 0 && <span className="text-slate-500 text-sm italic w-full text-center">All taxa placed</span>}
                  </div>
                </div>

                <div className="bg-slate-800/80 rounded-2xl p-4 border border-purple-500/30 border-dashed">
                  <h3 className="text-xs font-semibold uppercase text-slate-400 mb-3 tracking-wider">Character Bank (Drag these to the diagonal)</h3>
                  <div className="flex flex-wrap gap-2 min-h-[40px]">
                    {availableTraits.map(trait => (
                      <div key={trait} draggable onDragStart={(e) => handleDragStart(e, 'trait', trait)}
                        className="cursor-grab active:cursor-grabbing bg-purple-600 hover:bg-purple-500 text-white px-3 py-1.5 rounded-lg text-sm font-medium shadow-lg transition-transform hover:-translate-y-0.5"
                      >
                        {trait}
                      </div>
                    ))}
                    {availableTraits.length === 0 && <span className="text-slate-500 text-sm italic w-full text-center">All characters placed</span>}
                  </div>
                </div>
              </div>
            </div>

            <div className="lg:col-span-8 flex flex-col">
              <div className="bg-slate-800 rounded-2xl border border-slate-700 shadow-xl overflow-hidden flex-grow relative flex flex-col min-h-[600px]">
                <div className="bg-slate-800 border-b border-slate-700 p-4 flex justify-between items-center z-10">
                  <span className="font-semibold text-slate-300 hidden sm:inline">Tree Construction Zone</span>
                  <div className="flex gap-3 w-full sm:w-auto justify-end">
                    <button onClick={resetActivity} className="flex items-center gap-2 px-3 py-2 bg-slate-700 hover:bg-slate-600 text-sm rounded-lg transition-colors">
                      <RefreshCw className="w-4 h-4" /> Reset
                    </button>
                    <button onClick={checkAnswers} className={`flex items-center gap-2 px-4 py-2 ${tColor.bg} hover:opacity-90 text-white font-medium text-sm rounded-lg shadow-lg ${tColor.shadow} transition-all`}>
                      <CheckCircle className="w-4 h-4" /> Verify Tree
                    </button>
                  </div>
                </div>

                {feedback && (
                  <div className={`p-4 flex items-center gap-3 animate-in fade-in slide-in-from-top-2 ${
                    feedback.type === 'success' ? 'bg-emerald-500/20 text-emerald-300 border-b border-emerald-500/30' :
                    feedback.type === 'error' ? 'bg-red-500/20 text-red-300 border-b border-red-500/30' :
                    'bg-amber-500/20 text-amber-300 border-b border-amber-500/30'
                  }`}>
                    {feedback.type === 'success' && <CheckCircle className="w-5 h-5 flex-shrink-0" />}
                    {feedback.type !== 'success' && <ShieldAlert className="w-5 h-5 flex-shrink-0" />}
                    <span className="font-medium">{feedback.message}</span>
                  </div>
                )}

                <div className="relative flex-grow w-full bg-slate-900/50 p-4 overflow-x-auto overflow-y-hidden flex items-center justify-center">
                  <svg viewBox="0 0 850 450" className="w-full max-w-[850px] min-w-[700px] h-auto drop-shadow-xl overflow-visible">
                    <path d="M 50,400 L 750,100" stroke="#475569" strokeWidth="6" fill="none" strokeLinecap="round" />
                    
                    {layout.map((node, i) => (
                      <g key={`lines-${i}`}>
                        {i < layout.length - 1 && (
                           <path d={`M ${node.orgX},${node.branchY} L ${node.orgX},${node.orgY}`} stroke="#475569" strokeWidth="6" fill="none" strokeLinecap="round" />
                        )}
                        <line x1={node.tickX - 5} y1={node.tickY + 12} x2={node.tickX + 5} y2={node.tickY - 12} stroke="#475569" strokeWidth="4" strokeLinecap="round" />
                      </g>
                    ))}

                    {layout.map((node, i) => (
                      <g key={`zones-${i}`}>
                        <foreignObject x={node.orgX - 70} y={node.orgY - 70} width="140" height="60">
                          <DropZone type="org" index={i} item={placedOrgs[i]} onDrop={handleDrop} onDragOver={handleDragOver} onRemove={removePlaced} />
                        </foreignObject>
                        <foreignObject x={node.tzX} y={node.tzY} width="140" height="60">
                          <DropZone type="trait" index={i} item={placedTraits[i]} onDrop={handleDrop} onDragOver={handleDragOver} onRemove={removePlaced} />
                        </foreignObject>
                      </g>
                    ))}
                  </svg>
                </div>
              </div>
            </div>
          </div>
        </div>
        <PrintableWorksheet />
        </>
      );
    }

    function DropZone({ type, index, item, onDrop, onDragOver, onRemove }) {
      const isOrg = type === 'org';
      return (
        <div 
          onDrop={(e) => onDrop(e, type, index)}
          onDragOver={onDragOver}
          className={`w-full h-full flex items-center justify-center p-1.5 rounded-xl transition-all duration-200 
            ${!item ? `border-2 border-dashed bg-slate-900/60 backdrop-blur-sm ${isOrg ? 'border-blue-500/40 hover:border-blue-400 hover:bg-blue-500/20' : 'border-purple-500/40 hover:border-purple-400 hover:bg-purple-500/20'}` 
            : `shadow-lg border-2 border-transparent ${isOrg ? 'bg-blue-600 shadow-blue-900/50' : 'bg-purple-600 shadow-purple-900/50'}`}`}
        >
          {item ? (
            <div onClick={() => onRemove(type, index)} className="w-full h-full flex items-center justify-center font-bold text-white text-xs sm:text-sm text-center cursor-pointer hover:opacity-80 transition-opacity leading-tight" title="Click to remove">
              {item}
            </div>
          ) : (
            <div className={`text-[10px] sm:text-xs font-bold uppercase tracking-widest opacity-40 text-center ${isOrg ? 'text-blue-300' : 'text-purple-300'}`}>
              Drop<br/>{isOrg ? 'Taxon' : 'Trait'}
            </div>
          )}
        </div>
      );
    }

    function PrintableWorksheet() {
      return (
        <div className="hidden print:block bg-white text-black p-8 font-sans max-w-4xl mx-auto">
