      flame: (

          <circle cx="30" cy="30" r="3" fill="#f97316" className="animate-pulse"/><circle cx="70" cy="40" r="2" fill="#fef08a" className="animate-pulse"/>
        </svg>
      ),
      golem: (
        <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-[0_0_12px_rgba(45,212,191,0.5)]">
          <defs>
            <linearGradient id="cryst1" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stopColor="#5eead4"/><stop offset="100%" stopColor="#0f766e"/>

            <linearGradient id="cryst2" x1="100%" y1="0%" x2="0%" y2="100%">

      shadowcat: (
        <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-[0_0_15px_rgba(168,85,247,0.6)]">

          <path d="M35,60 Q50,45 70,55 L75,85 L65,85 L60,65 L45,65 L40,85 L30,85 Z" fill="url(#shadowGrad)" stroke="rgba(255,255,255,0.3)" strokeWidth="1"/>

      ),
      serpent: (
        <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-[0_0_12px_rgba(56,189,248,0.5)]">

            <linearGradient id="serpGrad" x1="0%" y1="0%" x2="100%" y2="100%">

              <stop offset="50%" stopColor="#0284c7"/>
              <stop offset="100%" stopColor="#082f49"/>

          </defs>
          <path d="M15,85 Q20,30 50,50 T85,15" fill="none" stroke="url(#serpGrad)" strokeWidth="18" strokeLinecap="round"/>
          <path d="M15,85 Q20,30 50,50 T85,15" fill="none" stroke="rgba(255,255,255,0.4)" strokeWidth="20" strokeLinecap="round" className="mix-blend-overlay"/>

    // --- DATA & KEYS ---
    const LEVELS = {
      salamanders: {
        id: 'salamanders',
        icon: Microscope,
        title: 'Level 1: Amphibian Analysis',
        themeColor: 'emerald',
        intro: "Use the dichotomous key to identify the scientific names of these 5 salamander specimens based on their physical characteristics.",
        ruler: { max: 12, unit: 'cm', targetMarker: 7 }, // The ruler goes up to 12cm, highlights the 7cm mark
        specimens: [
          { id: 's1', targetId: 'mudpuppy', svg: SVGS.mudpuppy, length: 10 },
          { id: 's2', targetId: 'spotted', svg: SVGS.spotted, length: 8.5 },
          { id: 's3', targetId: 'redbacked', svg: SVGS.redbacked, length: 5.5 }, // Specifically under 7cm!
          { id: 's4', targetId: 'siren', svg: SVGS.siren, length: 11 },
          { id: 's5', targetId: 'tiger', svg: SVGS.tiger, length: 9.5 }
        ],
        key: {
          '1': {
            a: { text: "Hind limbs absent", goto: "Siren intermedia (Siren)" },
            b: { text: "Hind limbs present", goto: "2" }
          },
          '2': {
            a: { text: "External gills present in adults", goto: "Necturus maculosus (Mud puppy)" },
            b: { text: "External gills absent in adults", goto: "3" }
          },
          '3': {
            a: { text: "Large size (over 7 cm long)", goto: "4" },
            b: { text: "Small size (under 7 cm long)", goto: "Plethodon cinereus (Red-backed salamander)" }
          },
          '4': {
            a: { text: "Body background black, large white spots completely covering body", goto: "Ambystoma tigrinum (Tiger salamander)" },
            b: { text: "Body background black, small round white spots in a row along each side", goto: "Ambystoma maculatum (Spotted salamander)" }
          }
        },
        targets: {
          'siren': 'Siren intermedia (Siren)',
          'mudpuppy': 'Necturus maculosus (Mud puppy)',
          'redbacked': 'Plethodon cinereus (Red-backed salamander)',
          'tiger': 'Ambystoma tigrinum (Tiger salamander)',
          'spotted': 'Ambystoma maculatum (Spotted salamander)'
        }
      },
      magical: {
        id: 'magical',
        icon: Wand2,
        title: 'Level 2: Magical Familiars',
        themeColor: 'purple',
        intro: "A portal has opened! Identify these newly discovered magical familiars based on their elemental composition and features.",
        ruler: { max: 20, unit: 'ft', targetMarker: null }, // Magical creatures use a 20ft scale!
        specimens: [
          { id: 'm1', targetId: 'owl', svg: SVGS.owl, length: 8 },
          { id: 'm2', targetId: 'serpent', svg: SVGS.serpent, length: 18 },
          { id: 'm3', targetId: 'golem', svg: SVGS.golem, length: 14 },
          { id: 'm4', targetId: 'shadowcat', svg: SVGS.shadowcat, length: 10 },
          { id: 'm5', targetId: 'flame', svg: SVGS.flame, length: 4 }
        ],
        key: {
          '1': {
            a: { text: "Creature is primarily airborne or floating without wings", goto: "2" },
            b: { text: "Creature is ground-dwelling or uses wings to fly", goto: "3" }
          },
          '2': {
            a: { text: "Body is composed entirely of elemental energy (fire/light)", goto: "Ignis spiritus (Flame Sprite)" },
            b: { text: "Body is elongated, serpentine, and adorned with stars", goto: "Serpens stella (Star Serpent)" }
          },
          '3': {
            a: { text: "Body is composed of inorganic minerals or crystals", goto: "Geo crystallis (Crystal Golem)" },
            b: { text: "Body is composed of organic matter (fur/feathers)", goto: "4" }
          },
          '4': {
            a: { text: "Has feathers and prominent glowing yellow eyes", goto: "Strigiformes luna (Moon Owl)" },
            b: { text: "Has dark fur and possesses multiple tails", goto: "Felis umbra (Shadow Cat)" }
          }
        },
        targets: {
          'flame': 'Ignis spiritus (Flame Sprite)',
          'serpent': 'Serpens stella (Star Serpent)',
          'golem': 'Geo crystallis (Crystal Golem)',
          'owl': 'Strigiformes luna (Moon Owl)',
          'shadowcat': 'Felis umbra (Shadow Cat)'
        }
      }
    };

    function App() {
      const [showIntro, setShowIntro] = useState(true);
      const [activeLevelId, setActiveLevelId] = useState('salamanders');
      const level = LEVELS[activeLevelId];

      const [identified, setIdentified] = useState({}); 
      const [selectedSpecimen, setSelectedSpecimen] = useState(null);
      const [currentStep, setCurrentStep] = useState('1');
      const [feedback, setFeedback] = useState(null);
      const [shake, setShake] = useState(false);

      useEffect(() => {
        setIdentified({});
        setSelectedSpecimen(null);
        setCurrentStep('1');
        setFeedback(null);
      }, [activeLevelId]);

      const tColor = level.themeColor === 'emerald' 
        ? { text: 'text-emerald-400', bg: 'bg-emerald-600', hover: 'hover:bg-emerald-500', border: 'border-emerald-500', glow: 'shadow-emerald-900/50' }
        : { text: 'text-purple-400', bg: 'bg-purple-600', hover: 'hover:bg-purple-500', border: 'border-purple-500', glow: 'shadow-purple-900/50' };

      const handleSelectSpecimen = (specimen) => {
        if (identified[specimen.id]) return; 
        setSelectedSpecimen(specimen);
        setCurrentStep('1');
        setFeedback(null);
      };

      const handleChoice = (gotoValue) => {
        if (level.key[gotoValue]) {
          setCurrentStep(gotoValue);
          setFeedback(null);
        } else {
          checkAnswer(gotoValue);
        }
      };

      const checkAnswer = (guessName) => {
        const correctName = level.targets[selectedSpecimen.targetId];
        
        if (guessName === correctName) {
          setIdentified(prev => ({ ...prev, [selectedSpecimen.id]: correctName }));
          setFeedback({ type: 'success', msg: `Correct! Identified as ${correctName}` });
          setSelectedSpecimen(null);
        } else {
          setFeedback({ type: 'error', msg: `Incorrect identification. This is not ${guessName}.` });
          setShake(true);
          setTimeout(() => setShake(false), 500);
          setCurrentStep('1'); 
        }
      };

      const isLevelComplete = Object.keys(identified).length === level.specimens.length;

      if (showIntro) {
        return (
          <>
          <div className="min-h-screen flex flex-col items-center justify-center p-6 print:hidden">
            <div className="max-w-4xl w-full space-y-8 text-center">
              <div className="inline-flex items-center justify-center p-5 bg-emerald-500/20 rounded-full mb-4 border border-emerald-500/30">
                <Search className="w-16 h-16 text-emerald-400" />
              </div>
              <h1 className="text-4xl md:text-5xl font-bold text-white">Interactive Dichotomous Key Lab</h1>
              <p className="text-lg text-slate-400 max-w-2xl mx-auto leading-relaxed">
                A dichotomous key is a scientific tool used to identify different organisms. It consists of a series of statements with two choices (a or b) that lead the user to the correct identification.
              </p>
              
              <div className="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl max-w-2xl mx-auto text-left space-y-4">
                <h3 className="font-bold text-xl text-white flex items-center gap-2">
                  <BookOpen className="w-5 h-5 text-emerald-400" /> How to Play
                </h3>
                <ol className="list-decimal list-inside text-slate-300 space-y-2">
                  <li>Select an unidentified specimen from the holding box.</li>
                  <li>Read the two statements at Step 1 of the key.</li>
                  <li>Examine the specimen closely and choose the statement that best describes it.</li>
                  <li>Follow the directions (e.g., "Go to 3") until you reach a final scientific name!</li>
                </ol>
              </div>

              <div className="pt-6">
                <button onClick={() => setShowIntro(false)} className="group inline-flex items-center gap-3 px-8 py-4 bg-emerald-600 hover:bg-emerald-500 text-white font-bold text-lg rounded-xl shadow-lg shadow-emerald-900/50 transition-all hover:-translate-y-1">
                  Enter the Lab <ArrowRight className="w-5 h-5 group-hover:translate-x-1 transition-transform" />
                </button>
              </div>
            </div>
          </div>
          <PrintableWorksheet levels={LEVELS} />
          </>
        );
      }

      return (
        <>
        <div className="min-h-screen flex flex-col print:hidden">
          <header className="bg-slate-800 border-b border-slate-700 px-6 py-4 shadow-md z-10">
            <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
              <div className="flex items-center gap-3">
                <level.icon className={`w-8 h-8 ${tColor.text}`} />
                <div>
                  <h1 className="text-2xl font-bold text-white">{level.title}</h1>
                  <p className="text-sm text-slate-400">Dichotomous Key Analysis</p>
                </div>
              </div>
              
              <div className="flex items-center gap-2 bg-slate-900 p-1.5 rounded-xl border border-slate-700">
                 <button onClick={() => window.print()} className="px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2 text-emerald-400 hover:bg-slate-800 border-r border-slate-700 pr-5">
                  <Printer className="w-4 h-4" /> Print Lab
                </button>
                <button onClick={() => setShowIntro(true)} className="px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2 text-slate-400 hover:bg-slate-800 border-r border-slate-700 pr-5">
                  <BookOpen className="w-4 h-4" /> Intro
                </button>
                {Object.values(LEVELS).map(l => (
                  <button key={l.id} onClick={() => setActiveLevelId(l.id)}
                    className={`px-4 py-2 rounded-lg text-sm font-medium transition-all flex items-center gap-2 ${activeLevelId === l.id ? `${tColor.bg} text-white` : 'text-slate-400 hover:bg-slate-800'}`}>
                    {l.title.split(':')[0]}
                  </button>
                ))}
              </div>
            </div>
          </header>

          <main className="flex-grow max-w-7xl w-full mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            {/* Holding Box */}
            <div className="lg:col-span-5 bg-slate-800 rounded-2xl border border-slate-700 shadow-xl p-5 flex flex-col">
              <h2 className="text-lg font-bold text-white mb-2 flex items-center gap-2">
                <Search className={`w-5 h-5 ${tColor.text}`} /> Specimen Holding Box
              </h2>
              <p className="text-sm text-slate-400 mb-4">{level.intro}</p>
              
              <div className="grid grid-cols-2 gap-3 flex-grow overflow-y-auto pr-2">
                {level.specimens.map((specimen, idx) => {
                  const isIded = !!identified[specimen.id];
                  const isSelected = selectedSpecimen?.id === specimen.id;
                  
                  return (
                    <div 
                      key={specimen.id}
                      onClick={() => handleSelectSpecimen(specimen)}
                      className={`relative flex flex-col items-center justify-center p-4 rounded-xl border-2 transition-all
                        ${isIded ? 'border-slate-600 bg-slate-800/50 cursor-default opacity-60' : 
                          isSelected ? `${tColor.border} bg-slate-700 shadow-lg ${tColor.glow} cursor-default` : 
                          'border-slate-600 bg-slate-700 hover:border-slate-500 hover:bg-slate-600 cursor-pointer'}`}
                    >
                      <div className={`w-24 h-24 mb-3 flex items-center justify-center rounded-full bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] ${isIded ? 'from-slate-700 to-slate-800' : isSelected ? 'from-emerald-900/40 to-slate-700' : 'from-slate-600 to-slate-700'} shadow-inner p-2`}>
                         {/* We scale slightly in the holding box just to hint at sizes, Math.max ensures tiny ones are still clickable */}
                         <div className="flex items-center justify-center" style={{ width: `${Math.max((specimen.length / level.ruler.max) * 100, 45)}%` }}>
                            {specimen.svg}
                         </div>
                      </div>
                      <div className="text-center w-full">
                        {isIded ? (
                          <span className="text-xs font-bold text-emerald-400 bg-emerald-400/10 px-2 py-1 rounded block truncate" title={identified[specimen.id]}>
                            {identified[specimen.id]}
                          </span>
                        ) : (
                          <span className="text-xs font-bold text-slate-400 tracking-widest">SPECIMEN {idx + 1}</span>
                        )}
                      </div>
                      {isIded && <CheckCircle className="absolute top-2 right-2 w-5 h-5 text-emerald-500" />}
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Analysis Box */}
            <div className="lg:col-span-7 flex flex-col gap-6">
              
              {feedback && (
                <div className={`p-4 rounded-xl border flex items-center gap-3 animate-in fade-in slide-in-from-top-2 ${
                  feedback.type === 'success' ? 'bg-emerald-500/20 border-emerald-500/30 text-emerald-300' : 'bg-red-500/20 border-red-500/30 text-red-300'
                }`}>
                  {feedback.type === 'success' ? <CheckCircle className="w-6 h-6" /> : <ShieldAlert className="w-6 h-6" />}
                  <span className="font-medium text-lg">{feedback.msg}</span>
                </div>
              )}

              {isLevelComplete ? (
                 <div className="bg-slate-800 rounded-2xl border border-emerald-500 shadow-xl shadow-emerald-900/20 p-8 flex flex-col items-center justify-center text-center flex-grow">
                    <div className="w-20 h-20 bg-emerald-500/20 rounded-full flex items-center justify-center mb-6">
                      <CheckCircle className="w-12 h-12 text-emerald-400" />
                    </div>
                    <h2 className="text-3xl font-bold text-white mb-2">Analysis Complete!</h2>
                    <p className="text-slate-400 text-lg">You have successfully identified all specimens using the dichotomous key.</p>
                 </div>
              ) : !selectedSpecimen ? (
                <div className="bg-slate-800/50 rounded-2xl border border-slate-700 border-dashed flex-grow flex flex-col items-center justify-center p-8 text-center">
                  <Microscope className="w-16 h-16 text-slate-600 mb-4" />
                  <h3 className="text-xl font-medium text-slate-300">Terminal Standby</h3>
                  <p className="text-slate-500 mt-2 max-w-sm">Select an unidentified specimen from the holding box on the left to begin analysis.</p>
                </div>
              ) : (
                <div className={`bg-slate-800 rounded-2xl border ${tColor.border} shadow-xl flex-grow flex flex-col overflow-hidden ${shake ? 'animate-wiggle' : ''}`}>
                  
                  {/* Analysis Viewer with Dynamic Ruler */}
                  <div className="bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-slate-700 via-slate-800 to-slate-900 p-6 border-b border-slate-700 flex flex-col items-center justify-center relative min-h-[250px]">
                    <div className="absolute top-4 left-4 text-xs font-bold tracking-widest text-slate-400">ACTIVE ANALYSIS</div>
                    <button onClick={() => {setSelectedSpecimen(null); setFeedback(null);}} className="absolute top-4 right-4 text-xs font-medium text-slate-300 hover:text-white bg-slate-800 border border-slate-600 px-3 py-1 rounded transition-colors hover:bg-slate-700">Cancel</button>
                    
                    {/* The Calibrated Measurement Stage */}
                    <div className="relative flex flex-col items-center w-full max-w-sm mt-6">
                      
                      {/* Scaled Specimen Container */}
                      <div 
                        className="drop-shadow-2xl flex items-center justify-center transition-all duration-500 ease-out"
                        style={{ width: `${(selectedSpecimen.length / level.ruler.max) * 100}%` }}
                      >
                        {selectedSpecimen.svg}
                      </div>

                      {/* The Dynamic Ruler */}
                      <div className="w-full mt-4 border-t-2 border-slate-500 relative h-8">
                        {Array.from({ length: level.ruler.max + 1 }).map((_, i) => {
                          const isTarget = level.ruler.targetMarker === i;
                          const showLabel = i % 2 === 0 || isTarget;
                          
                          return (
                            <div key={i} className="absolute top-0 flex flex-col items-center" style={{ left: `${(i / level.ruler.max) * 100}%`, transform: 'translateX(-50%)' }}>
                              <div className={`w-0.5 ${isTarget ? `h-4 ${tColor.bg}` : 'h-2 bg-slate-500'}`}></div>
                              {showLabel && (
                                <span className={`text-[10px] mt-1 font-bold ${isTarget ? tColor.text : 'text-slate-500'}`}>
                                  {i}
                                </span>
                              )}
                            </div>
                          );
                        })}
                        {/* Ruler Unit */}
                        <div className="absolute -right-8 top-1 text-xs font-bold text-slate-500">{level.ruler.unit}</div>
                      </div>
                    </div>

                  </div>

                  {/* Key Interactive Buttons */}
                  <div className="p-6 flex-grow flex flex-col">
                    <div className="flex justify-between items-center mb-6">
                      <h3 className="text-xl font-bold text-white">Step {currentStep}</h3>
                      {currentStep !== '1' && (
                        <button onClick={() => setCurrentStep('1')} className="text-sm flex items-center gap-1 text-slate-400 hover:text-white transition-colors">
                          <RefreshCw className="w-4 h-4" /> Restart Key
                        </button>
                      )}
                    </div>

                    <div className="space-y-4 flex-grow">
                      {['a', 'b'].map(option => {
                        const stepData = level.key[currentStep][option];
                        const isFinal = isNaN(parseInt(stepData.goto)); 

                        return (
                          <button
                            key={option}
                            onClick={() => handleChoice(stepData.goto)}
                            className="w-full text-left p-4 rounded-xl bg-slate-700/50 hover:bg-slate-700 border border-slate-600 hover:border-slate-500 transition-all group flex items-start gap-4"
                          >
                            <span className="shrink-0 w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center font-bold text-slate-300 border border-slate-600 group-hover:bg-slate-600 group-hover:text-white">
                              {currentStep}{option}
                            </span>
                            <div className="flex-grow">
                              <p className="text-white font-medium text-lg leading-snug mb-2">{stepData.text}</p>
                              <div className="flex items-center gap-2 text-sm font-bold tracking-wide">
                                <ArrowRight className={`w-4 h-4 ${isFinal ? tColor.text : 'text-slate-400'}`} />
                                <span className={isFinal ? tColor.text : 'text-slate-400'}>
                                  {isFinal ? `Identify as: ${stepData.goto}` : `Go to Step ${stepData.goto}`}
                                </span>
                              </div>
                            </div>
                          </button>
                        );
                      })}
                    </div>
                  </div>
                </div>
              )}
            </div>
          </main>
        </div>
        <PrintableWorksheet levels={LEVELS} />
        </>
      );
    }

    function PrintableWorksheet({ levels }) {
      return (
        <div className="hidden print:block bg-white text-black font-sans max-w-4xl mx-auto text-sm">
          
          <div className="flex justify-between items-end border-b-2 border-slate-800 pb-2 mb-6">
            <div>
              <h1 className="text-2xl font-bold text-slate-900">Dichotomous Key Lab</h1>
            </div>
            <div className="space-y-2 text-sm text-slate-800">
              <p><strong>Name:</strong> ______________________________ <strong>Date:</strong> ___________</p>
            </div>
          </div>

          <div className="mb-6">
            <h2 className="font-bold text-lg border-b border-slate-300 mb-2">Pre-Lab Analysis</h2>
            <p className="mb-4 text-xs">1. Explain why it is important to always start at Step 1 of a dichotomous key for every new specimen you identify:</p>
            <div className="border-b border-slate-300 mt-6"></div>
            <div className="border-b border-slate-300 mt-6"></div>
          </div>

          {Object.values(levels).map((level, idx) => (
            <div key={level.id} className={idx > 0 ? "break-before-page pt-4" : ""}>
              <h2 className="font-bold text-xl border-b-2 border-slate-800 pb-1 mb-4">{level.title}</h2>
              <p className="mb-4 italic text-xs">{level.intro}</p>

              <div className="bg-slate-100 p-4 border border-slate-300 rounded mb-6">
                <h3 className="font-bold mb-3 uppercase tracking-widest text-xs">The Identification Key</h3>
                <div className="space-y-2 text-xs">
                  {Object.entries(level.key).map(([stepNum, options]) => (
                    <div key={stepNum} className="grid grid-cols-[20px_1fr_auto] gap-2 border-b border-slate-200 pb-1">
                      <div className="font-bold text-right">{stepNum}a</div>
                      <div>{options.a.text}</div>
                      <div className="font-semibold">{isNaN(parseInt(options.a.goto)) ? options.a.goto : `Go to ${options.a.goto}`}</div>
                      
                      <div className="font-bold text-right">{stepNum}b</div>
                      <div>{options.b.text}</div>
                      <div className="font-semibold">{isNaN(parseInt(options.b.goto)) ? options.b.goto : `Go to ${options.b.goto}`}</div>
                    </div>
                  ))}
                </div>
              </div>

              <h3 className="font-bold mb-3 uppercase tracking-widest text-xs border-b border-slate-300">Specimens to Identify</h3>
              <div className="grid grid-cols-2 gap-x-8 gap-y-6">
                {level.specimens.map((specimen, i) => (
                  <div key={specimen.id} className="flex gap-4 items-start border border-slate-300 p-3 rounded">
                    <div className="w-20 h-20 shrink-0 text-slate-800 bg-slate-50 rounded-full flex items-center justify-center border border-slate-200 p-2">
                       {/* Uniform sizing for the printable to save space */}
                       <div className="w-full h-full flex items-center justify-center p-2">
                         {specimen.svg}
                       </div>
                    </div>
                    <div className="flex-grow flex flex-col justify-between h-full space-y-3">
                      <p className="font-bold text-xs uppercase tracking-widest">Specimen {i + 1}</p>
                      <div>
                        <p className="text-[10px] text-slate-500 mb-1">Path taken (e.g., 1b &rarr; 2a):</p>
                        <div className="border-b border-slate-400 border-dashed w-full"></div>
                      </div>
                      <div>
                         <p className="text-[10px] text-slate-500 mb-1">Scientific Name:</p>
                        <div className="border-b border-slate-800 w-full"></div>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          ))}

        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
