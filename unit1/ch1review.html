    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f0fdf4; /* Light green bg */
        }
        h1, h2, h3, .header-font {
            font-family: 'Montserrat', sans-serif;
        }
        .jeopardy-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }
        .category-header {
            background-color: #15803d; /* Green 700 */
            color: white;
            padding: 15px 5px;
            text-align: center;
            font-weight: bold;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80px;
            font-size: 0.9rem;
            text-transform: uppercase;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .question-cell {
            background-color: #166534; /* Green 800 */
            color: #facc15; /* Yellow 400 */
            font-size: 1.5rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            aspect-ratio: 16/9;
            cursor: pointer;
            border-radius: 4px;
            transition: transform 0.1s, background-color 0.2s;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .question-cell:hover:not(.disabled) {
            transform: scale(1.05);
            background-color: #14532d;
            z-index: 10;
        }
        .question-cell.disabled {
            background-color: #dcfce7; /* Green 100 */
            color: #dcfce7;
            cursor: default;
            box-shadow: none;
            pointer-events: none;
        }
        .modal-overlay {
            background-color: rgba(0, 0, 0, 0.85);
        }
        .scenario-box {
            background-color: #fffbeb;
            border-left: 4px solid #fbbf24;
            padding: 1rem;
            margin-bottom: 1rem;
            font-style: italic;
            color: #4b5563;
        }
        @media (max-width: 768px) {
            .jeopardy-grid {
                grid-template-columns: repeat(2, 1fr); /* Stack for mobile */
            }
            .category-header {
                min-height: 50px;
            }
        }
    </style>
</head>

                { s: "You are investigating a mysterious illness. Under a standard light microscope (1000x magnification), you see nothing in the patient's blood. However, the patient is definitely sick.", q: "If you find a tiny protein-coated DNA strand under the Electron Microscope, you have found:", o: ["Bacteria", "Virus", "Fungus", "Parasitic Worm"], a: 1 }

        };

        // --- GAME STATE ---
        let numPlayers = 1;
        let totalRounds = 1;
        let currentRound = 1;
        let currentPlayer = 0; // 0 for P1, 1 for P2
        let scores = [0, 0];
        let currentBoardQuestions = {}; // Mapped by "categoryIndex_pointIndex" -> QuestionObject
        let answeredCount = 0;
        let totalQuestionsPerRound = 30; // 6 cats * 5 qs

        // --- SETUP LOGIC ---
        function selectPlayers(n) {
            numPlayers = n;
            document.getElementById('btn-p1').classList.toggle('bg-green-600', n===1);
            document.getElementById('btn-p1').classList.toggle('text-white', n===1);
            document.getElementById('btn-p1').classList.toggle('bg-gray-200', n===2);
            
            document.getElementById('btn-p2').classList.toggle('bg-green-600', n===2);
            document.getElementById('btn-p2').classList.toggle('text-white', n===2);
            document.getElementById('btn-p2').classList.toggle('bg-gray-200', n===1);
        }

        function selectRounds(n) {
            totalRounds = n;
            document.querySelectorAll('.round-btn').forEach(btn => {
                const val = parseInt(btn.dataset.val);
                if(val === n) {
                    btn.classList.add('bg-green-600', 'text-white');
                    btn.classList.remove('bg-gray-200', 'text-gray-700');
                } else {
                    btn.classList.remove('bg-green-600', 'text-white');
                    btn.classList.add('bg-gray-200', 'text-gray-700');
                }
            });
        }

        function startGame() {
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('game-screen').classList.add('flex');
            
            if(numPlayers === 1) {
                document.getElementById('p2-score-box').classList.add('hidden');
                document.getElementById('turn-indicator').classList.add('hidden');
            } else {
                document.getElementById('p2-score-box').classList.remove('hidden');
            }

            scores = [0, 0];
            currentPlayer = 0;
            currentRound = 1;
            
            initRound();
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function initRound() {
            currentBoardQuestions = {};
            answeredCount = 0;
            document.getElementById('current-round-display').innerText = currentRound;
            document.getElementById('end-round-btn').classList.add('hidden');
            
            // Build Grid
            const board = document.getElementById('board');
            board.innerHTML = '';

            // 1. Headers
            categories.forEach(cat => {
                const div = document.createElement('div');
                div.className = 'category-header';
                div.innerText = cat;
                board.appendChild(div);
            });

            // 2. Questions (Rows 100-500)
            // We need to pick 5 unique questions per category from the DB
            for(let pointLevel = 1; pointLevel <= 5; pointLevel++) {
                for(let catIndex = 0; catIndex < 6; catIndex++) {
                    const cellId = `${catIndex}_${pointLevel}`;
                    
                    // Logic to ensure randomization but consistency within a round
                    // We grab the full array for the category, shuffle it, then pop 5.
                    // Ideally we'd do this once per round start, not per cell.
                }
            }

            // Better approach: Pre-select questions for the round
            const points = [100, 200, 300, 400, 500];
            let gridHTML = "";
            
            // First headers
            categories.forEach(cat => {
                gridHTML += `<div class="category-header">${cat}</div>`;
            });

            // Prepare columns data
            let roundData = [];
            for(let c = 0; c < 6; c++) {
                let availableQs = [...db[c]]; 
                shuffleArray(availableQs);
                roundData[c] = availableQs.slice(0, 5); // Take first 5
            }

            // Create rows
            for(let r = 0; r < 5; r++) {
                for(let c = 0; c < 6; c++) {
                    const q = roundData[c][r];
                    const id = `${c}_${r}`; // col_row
                    const pointsVal = points[r];
                    currentBoardQuestions[id] = { ...q, value: pointsVal };
                    
                    gridHTML += `<div id="cell-${id}" class="question-cell" onclick="handleCellClick('${id}')">$${pointsVal}</div>`;
                }
            }

            board.innerHTML = gridHTML;
            updateTurnIndicator();
        }

        // --- GAMEPLAY ---

        function updateTurnIndicator() {
            if(numPlayers === 1) return;
            const ind = document.getElementById('turn-indicator');
            const p1Box = document.getElementById('p1-score-box');
            const p2Box = document.getElementById('p2-score-box');

            if(currentPlayer === 0) {
                ind.innerText = "Player 1's Turn";
                ind.classList.remove('bg-blue-400', 'text-blue-900');
                ind.classList.add('bg-yellow-400', 'text-yellow-900');
                p1Box.classList.add('border-green-500', 'bg-green-100');
                p1Box.classList.remove('opacity-50');
                p2Box.classList.remove('border-green-500', 'bg-green-100');
                p2Box.classList.add('opacity-50');
            } else {
                ind.innerText = "Player 2's Turn";
                ind.classList.remove('bg-yellow-400', 'text-yellow-900');
                ind.classList.add('bg-blue-400', 'text-blue-900');
                p2Box.classList.add('border-green-500', 'bg-green-100');
                p2Box.classList.remove('opacity-50');
                p1Box.classList.remove('border-green-500', 'bg-green-100');
                p1Box.classList.add('opacity-50');
            }
        }

        let currentQuestionId = null;

        function handleCellClick(id) {
            const cell = document.getElementById(`cell-${id}`);
            if(cell.classList.contains('disabled')) return;

            currentQuestionId = id;
            const qData = currentBoardQuestions[id];

            // Populate Modal
            document.getElementById('modal-value').innerText = "$" + qData.value;
            // Parse category index from ID
            const catIndex = parseInt(id.split('_')[0]);
            document.getElementById('modal-category').innerText = categories[catIndex];
            
            // Scenario
            const scenBox = document.getElementById('modal-scenario');
            if(qData.s) {
                scenBox.classList.remove('hidden');
                scenBox.innerText = qData.s;
            } else {
                scenBox.classList.add('hidden');
            }

            document.getElementById('modal-question').innerText = qData.q;

            // Options
            const optContainer = document.getElementById('modal-options');
            optContainer.innerHTML = '';
            qData.o.forEach((optText, idx) => {
                const btn = document.createElement('button');
                btn.className = "p-4 bg-gray-100 hover:bg-green-100 border-2 border-gray-200 hover:border-green-500 rounded-lg text-left transition font-semibold text-gray-700";
                btn.innerText = optText;
                btn.onclick = () => checkAnswer(idx);
                optContainer.appendChild(btn);
            });

            // Reset Feedback UI
            document.getElementById('modal-feedback').classList.add('hidden');
            document.getElementById('modal-continue').classList.add('hidden');
            document.getElementById('modal-options').classList.remove('hidden');

            // Show Modal
            document.getElementById('question-modal').classList.remove('hidden');
        }

        function checkAnswer(selectedIndex) {
            const qData = currentBoardQuestions[currentQuestionId];
            const isCorrect = (selectedIndex === qData.a);
            
            // Feedback UI
            const feedback = document.getElementById('modal-feedback');
            feedback.classList.remove('hidden');
            
            const optDiv = document.getElementById('modal-options');
            
            // Highlight Correct/Wrong
            const buttons = optDiv.getElementsByTagName('button');
            for(let i=0; i<buttons.length; i++) {
                buttons[i].disabled = true;
                if(i === qData.a) {
                    buttons[i].classList.add('bg-green-500', 'text-white', 'border-green-600');
                    buttons[i].classList.remove('bg-gray-100', 'text-gray-700');
                } else if(i === selectedIndex && !isCorrect) {
                    buttons[i].classList.add('bg-red-500', 'text-white', 'border-red-600');
                    buttons[i].classList.remove('bg-gray-100', 'text-gray-700');
                }
            }

            if(isCorrect) {
                feedback.innerHTML = "CORRECT!";
                feedback.className = "p-4 text-center text-white font-bold text-lg bg-green-600 rounded mb-4";
                scores[currentPlayer] += qData.value;
            } else {
                feedback.innerHTML = "INCORRECT";
                feedback.className = "p-4 text-center text-white font-bold text-lg bg-red-600 rounded mb-4";
                // Optional: Deduct points? Jeopardy usually does, but school games often don't. 
                // Let's keep it positive (no deduction) for this style unless specified.
            }

            // Update Scoreboard
            document.getElementById('score-1').innerText = scores[0];
            document.getElementById('score-2').innerText = scores[1];

            document.getElementById('modal-continue').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('question-modal').classList.add('hidden');
            
            // Disable cell
            const cell = document.getElementById(`cell-${currentQuestionId}`);
            cell.classList.add('disabled');
            cell.innerText = ""; // Clear value

            answeredCount++;

            // Switch Player
            if(numPlayers === 2) {
                currentPlayer = currentPlayer === 0 ? 1 : 0;
                updateTurnIndicator();
            }

            // Check End of Round
            if(answeredCount >= 30) {
                if(currentRound < totalRounds) {
                    document.getElementById('end-round-btn').classList.remove('hidden');
                } else {
                    document.getElementById('end-game-btn').classList.remove('hidden');
                }
            }
        }

        function nextRound() {
            currentRound++;
            initRound();
        }

        function finishGame() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('end-screen').classList.add('flex');

            document.getElementById('final-score-1').innerText = scores[0];
            
            const banner = document.getElementById('winner-banner');

            if(numPlayers === 1) {
                banner.innerText = `Final Score: ${scores[0]}`;
            } else {
                document.getElementById('final-p2-container').classList.remove('hidden');
                document.getElementById('final-score-2').innerText = scores[1];

                if(scores[0] > scores[1]) {
                    banner.innerText = "PLAYER 1 WINS!";
                } else if (scores[1] > scores[0]) {
                    banner.innerText = "PLAYER 2 WINS!";
                } else {
                    banner.innerText = "IT'S A TIE!";
                }
            }
        }

    </script>
