<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio-Builder & Hydrolysis Hero</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0f172a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; }
        #gameCanvas { display: block; width: 100vw; height: 100vh; }
        
        /* UI Layers */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .pointer-events-auto { pointer-events: auto; }
        
        /* Glassmorphism panels */
        .glass-panel { background: rgba(30, 41, 59, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.15); }
        
        /* Modals & Menus */
        .overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.7); z-index: 50; transition: opacity 0.3s; pointer-events: auto;}
        .hidden { display: none !important; }
        
        button { transition: all 0.2s; }
        button:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.1); }
        button:active:not(:disabled) { transform: translateY(1px); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Arcade Controls for Touch/Mobile */
        #arcade-controls { position: absolute; bottom: 20px; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 0 40px; pointer-events: none; z-index: 40; }
        .arcade-btn { pointer-events: auto; width: 80px; height: 80px; border-radius: 50%; background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.5); display: flex; align-items: center; justify-content: center; font-size: 30px; user-select: none; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <!-- UI Overlay for Learning Mode -->
    <div id="ui-layer" class="p-4 md:p-8 hidden flex-col justify-between">
        <div class="flex justify-between items-start">
            <div class="glass-panel p-4 rounded-xl shadow-lg">
                <h1 class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-blue-500" id="level-title">Bio-Builder</h1>
                <p class="text-slate-300 text-sm" id="level-subtitle">Loading...</p>
            </div>
            <div class="glass-panel p-2 rounded-xl shadow-lg pointer-events-auto flex gap-2">
                <button id="btn-menu-return" class="bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded-lg font-bold text-sm">Main Menu</button>
            </div>
        </div>

        <div id="center-controls" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 pointer-events-auto hidden flex gap-4">
             <button id="btn-action1" class="bg-purple-600 hover:bg-purple-500 text-white px-6 py-3 rounded-full font-bold shadow-[0_0_15px_rgba(147,51,234,0.5)]"></button>
             <button id="btn-action2" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-3 rounded-full font-bold shadow-[0_0_15px_rgba(37,99,235,0.5)]"></button>
        </div>

        <div id="dialogue-box" class="glass-panel p-6 rounded-2xl shadow-2xl flex items-center gap-6 w-[90%] max-w-4xl pointer-events-auto absolute bottom-8 left-1/2 transform -translate-x-1/2">
            <div class="text-6xl bg-slate-800 rounded-full p-4 border-2 border-slate-600">👩‍🔬</div>
            <div class="flex-1">
                <h3 class="text-green-400 font-bold mb-1">Dr. Synth</h3>
                <p id="dialogue-text" class="text-lg text-slate-100">...</p>
            </div>
        </div>
    </div>

    <!-- Main Menu Overlay -->
    <div id="main-menu" class="overlay">
        <div class="glass-panel p-10 rounded-3xl max-w-2xl w-full text-center shadow-[0_0_40px_rgba(34,197,94,0.3)]">
            <h1 class="text-6xl font-extrabold mb-4 text-transparent bg-clip-text bg-gradient-to-r from-green-400 via-blue-500 to-purple-500">Bio-Builder</h1>
            <p class="text-xl text-slate-300 mb-8">Master Macromolecules: Structure & Function</p>
            
            <div class="space-y-4 flex flex-col items-center">
                <button id="btn-start-learn" class="w-64 bg-green-600 hover:bg-green-500 text-white text-2xl font-bold py-4 px-8 rounded-xl shadow-lg border-b-4 border-green-800">Learning Lab</button>
                
                <div class="relative w-64">
                    <button id="btn-start-arcade" disabled class="w-full bg-blue-600 text-white text-2xl font-bold py-4 px-8 rounded-xl shadow-lg border-b-4 border-blue-800">Arcade Mode</button>
                    <div id="arcade-lock-msg" class="absolute -right-32 top-1/2 transform -translate-y-1/2 text-sm text-red-400 bg-red-900/50 px-3 py-1 rounded-full border border-red-500/50 flex items-center gap-2">
                        🔒 Finish Lab First
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Educational Info Modal -->
    <div id="info-modal" class="overlay hidden">
        <div class="glass-panel p-8 rounded-2xl max-w-xl w-full mx-4 shadow-2xl border-t-4 border-t-blue-500">
            <div class="flex items-center gap-4 mb-4">
                <div id="info-icon" class="text-4xl bg-blue-900/50 p-3 rounded-full">📘</div>
                <h2 id="info-title" class="text-2xl font-bold text-blue-300">Concept File</h2>
            </div>
            <hr class="border-slate-600 mb-4">
            <div id="info-content" class="text-lg text-slate-200 leading-relaxed mb-6 space-y-4">
                <!-- Content injected here -->
            </div>
            <div class="flex justify-end">
                <button id="btn-info-continue" class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-3 rounded-xl font-bold text-lg shadow-lg">Acknowledge</button>
            </div>
        </div>
    </div>

    <!-- Arcade UI Overlay -->
    <div id="arcade-ui" class="absolute top-0 left-0 w-full h-full pointer-events-none hidden">
        <div class="p-6 flex justify-between items-start">
            <div class="glass-panel px-6 py-3 rounded-xl font-mono text-2xl text-green-400 shadow-[0_0_15px_rgba(34,197,94,0.3)] border-green-500/30">
                SCORE: <span id="arcade-score">0</span>
            </div>
            <div class="glass-panel px-6 py-3 rounded-xl text-2xl shadow-[0_0_15px_rgba(239,68,68,0.3)] border-red-500/30">
                LIVES: <span id="arcade-lives">⭐⭐⭐</span>
            </div>
            <button id="btn-quit-arcade" class="pointer-events-auto bg-slate-700 hover:bg-red-600 text-white px-4 py-2 rounded-lg font-bold">Quit Arcade</button>
        </div>
        
        <!-- On-screen controls for touch -->
        <div id="arcade-controls">
            <div class="flex gap-4">
                <button class="arcade-btn" id="btn-left">◀</button>
                <button class="arcade-btn" id="btn-right">▶</button>
            </div>
            <button class="arcade-btn !bg-blue-500/30 !w-24 !h-24 !border-blue-400" id="btn-fire">H₂O</button>
        </div>
    </div>

<script>
/**
 * BIO-BUILDER & HYDROLYSIS HERO
 * Combined Interactive Learning Lab and Arcade Shooter.
 */

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- DOM ELEMENTS ---
const uiLayer = document.getElementById('ui-layer');
const dialogueText = document.getElementById('dialogue-text');
const levelTitle = document.getElementById('level-title');
const levelSubtitle = document.getElementById('level-subtitle');
const centerControls = document.getElementById('center-controls');
const btnAction1 = document.getElementById('btn-action1');
const btnAction2 = document.getElementById('btn-action2');
const btnMenuReturn = document.getElementById('btn-menu-return');

const mainMenu = document.getElementById('main-menu');
const btnStartLearn = document.getElementById('btn-start-learn');
const btnStartArcade = document.getElementById('btn-start-arcade');
const arcadeLockMsg = document.getElementById('arcade-lock-msg');

const infoModal = document.getElementById('info-modal');
const infoTitle = document.getElementById('info-title');
const infoContent = document.getElementById('info-content');
const btnInfoContinue = document.getElementById('btn-info-continue');

const arcadeUI = document.getElementById('arcade-ui');
const arcadeScoreDisplay = document.getElementById('arcade-score');
const arcadeLivesDisplay = document.getElementById('arcade-lives');
const btnQuitArcade = document.getElementById('btn-quit-arcade');

// --- GLOBAL STATE ---
let width, height;
let gameMode = 'MENU'; // 'MENU', 'LEARN_INFO', 'LEARN_PLAY', 'ARCADE', 'GAME_OVER'
let gameState = 0; // Current learning level index
let particles = [];
let monomers = [];
let bonds = [];
let currentLevelData = {};
let isAnimating = false;
let arcadeUnlocked = false;

// Input State
let mouseX = 0, mouseY = 0;
let keys = { ArrowLeft: false, ArrowRight: false, Space: false, a: false, d: false };

// --- RESIZE & INPUT HANDLING ---
function resize() {
    width = window.innerWidth; height = window.innerHeight;
    canvas.width = width; canvas.height = height;
}
window.addEventListener('resize', resize);
resize();

canvas.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });
canvas.addEventListener('click', (e) => { if(gameMode === 'LEARN_PLAY') handleLearnClick(e.clientX, e.clientY); });

window.addEventListener('keydown', (e) => { 
    if(keys.hasOwnProperty(e.key)) keys[e.key] = true; 
    // Fix for space bar (key is " " or code is "Space")
    if(e.key === ' ' || e.code === 'Space') { 
        keys.Space = true; 
        if (gameMode === 'ARCADE') e.preventDefault(); // Prevent page scroll when shooting
    }
});
window.addEventListener('keyup', (e) => { 
    if(keys.hasOwnProperty(e.key)) keys[e.key] = false; 
    if(e.key === ' ' || e.code === 'Space') keys.Space = false;
});

// Touch Arcade Controls
document.getElementById('btn-left').addEventListener('touchstart', (e) => { e.preventDefault(); keys.ArrowLeft = true; });
document.getElementById('btn-left').addEventListener('touchend', (e) => { e.preventDefault(); keys.ArrowLeft = false; });
document.getElementById('btn-right').addEventListener('touchstart', (e) => { e.preventDefault(); keys.ArrowRight = true; });
document.getElementById('btn-right').addEventListener('touchend', (e) => { e.preventDefault(); keys.ArrowRight = false; });
document.getElementById('btn-fire').addEventListener('touchstart', (e) => { e.preventDefault(); keys.Space = true; });
document.getElementById('btn-fire').addEventListener('touchend', (e) => { e.preventDefault(); keys.Space = false; });

// --- CLASSES ---
class Particle {
    constructor(x, y, text, color, vx, vy, life) {
        this.x = x; this.y = y; this.text = text; this.color = color;
        this.vx = vx; this.vy = vy; this.life = life; this.maxLife = life;
    }
    update() { this.x += this.vx; this.y += this.vy; this.life--; }
    draw(ctx) {
        ctx.globalAlpha = Math.max(0, this.life / this.maxLife);
        ctx.fillStyle = this.color;
        if (this.text) {
            ctx.font = 'bold 20px Arial'; ctx.textAlign = 'center'; ctx.fillText(this.text, this.x, this.y);
        } else {
            ctx.beginPath(); ctx.arc(this.x, this.y, 4, 0, Math.PI * 2); ctx.fill();
        }
        ctx.globalAlpha = 1.0;
    }
}

class Monomer {
    constructor(id, type, x, y) {
        this.id = id; this.type = type; 
        this.x = x; this.y = y; this.tx = x; this.ty = y; 
        this.vx = (Math.random() - 0.5) * 2; this.vy = (Math.random() - 0.5) * 2;
        this.radius = type === 'glucose' ? 30 : 25;
        this.color = type === 'glucose' ? '#22c55e' : `hsl(${Math.random()*360}, 70%, 60%)`;
        this.isLinked = false; this.flipped = false;
    }
    update(mode) {
        if (mode === 'LEARN_PLAY') {
            if (this.isLinked || isAnimating) {
                this.x += (this.tx - this.x) * 0.1; this.y += (this.ty - this.y) * 0.1;
            } else {
                this.x += this.vx; this.y += this.vy;
                if (this.x < this.radius || this.x > width - this.radius) this.vx *= -1;
                if (this.y < this.radius || this.y > height - 150 - this.radius) this.vy *= -1;
            }
        } else if (mode === 'ARCADE') {
            // In arcade, monomers fall. vx/vy are absolute speeds.
            this.x += this.vx; this.y += this.vy;
        }
    }
    draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        if (this.flipped) ctx.scale(1, -1);

        if (this.type === 'glucose') {
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                const angle = (Math.PI / 3) * i;
                ctx.lineTo(this.radius * Math.cos(angle), this.radius * Math.sin(angle));
            }
            ctx.closePath();
            ctx.fillStyle = 'rgba(34, 197, 94, 0.2)'; ctx.fill();
            ctx.lineWidth = 3; ctx.strokeStyle = this.color; ctx.stroke();
            
            ctx.fillStyle = 'white'; ctx.font = '12px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText('O', this.radius * 0.7, -this.radius * 0.4);
            if (!this.flipped) ctx.fillText('Glucose', 0, 0);
        } else if (this.type === 'amino') {
            ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.color; ctx.fill();
            ctx.lineWidth = 2; ctx.strokeStyle = 'white'; ctx.stroke();
            ctx.fillStyle = 'white'; ctx.font = 'bold 12px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText('AA', 0, 0);
        }
        ctx.restore();
    }
}

// --- EDUCATIONAL DATA (STRUCTURE & FUNCTION) ---
const LEVELS = [
    {
        title: "Starch: The Plant Pantry",
        subtitle: "Anabolism - Straight Chains",
        introTitle: "Pre-Lab Briefing: Starch",
        introText: "<p><strong>Structure:</strong> Starch is a polymer made of glucose monomers linked together in mostly straight, long chains.</p><br><p><strong>Function:</strong> Plants use starch to store energy. Because the chains are linear, they can coil up compactly like a spring, packing lots of energy into a tiny space (like inside a potato!).</p>",
        dialogue: "Find free-floating glucose and click them to form a straight starch chain via Dehydration Synthesis (losing water!).",
        outroTitle: "Analysis Complete",
        outroText: "Excellent! You built starch. Notice how the straight chain makes it easy to store? Next, let's see how animals do it.",
        setup: () => {
            monomers = []; bonds = [];
            for(let i=0; i<8; i++) monomers.push(new Monomer(i, 'glucose', Math.random()*width, Math.random()*(height-200)));
            currentLevelData = { type: 'linear', target: 5, linked: 0, chain: [] };
        }
    },
    {
        title: "Glycogen: The Animal Sprinter",
        subtitle: "Anabolism - Branched Chains",
        introTitle: "Pre-Lab Briefing: Glycogen",
        introText: "<p><strong>Structure:</strong> Glycogen is made of glucose, but unlike starch, it is <em>highly branched</em>.</p><br><p><strong>Function:</strong> Animals (like us) store glycogen in our liver and muscles. When you sprint, you need energy instantly. Because glycogen has many branches, it has many 'ends'. Enzymes can chop off dozens of glucose molecules simultaneously from all those ends!</p>",
        dialogue: "Build Glycogen! Click floating glucose to attach them as branches onto the main chain.",
        outroTitle: "Analysis Complete",
        outroText: "Great! Branches mean more surface area. More surface area means faster breakdown for quick animal energy.",
        setup: () => {
            monomers = []; bonds = [];
            for(let i=0; i<3; i++) {
                let m = new Monomer(i, 'glucose', width/2 - 100 + i*60, height/2);
                m.isLinked = true; m.tx = m.x; m.ty = m.y; monomers.push(m);
                if(i>0) bonds.push({m1: monomers[i-1], m2: monomers[i], type: 'alpha'});
            }
            for(let i=3; i<8; i++) monomers.push(new Monomer(i, 'glucose', Math.random()*width, Math.random()*(height-200)));
            currentLevelData = { type: 'branch', target: 4, linked: 0, baseChain: monomers.slice(0,3) };
        }
    },
    {
        title: "Cellulose: Nature's Concrete",
        subtitle: "Anabolism - Alternating Beta Bonds",
        introTitle: "Pre-Lab Briefing: Cellulose",
        introText: "<p><strong>Structure:</strong> Cellulose is made of glucose, but the bonds are different (Beta bonds). To make the connection fit, every alternating glucose molecule must flip upside down.</p><br><p><strong>Function:</strong> This alternating structure creates a perfectly straight, rigid chain. These chains stack together to form tough fibers. It's the primary component of plant cell walls (and wood)!</p>",
        dialogue: "Build Cellulose. Watch carefully as the molecules link—every other one will flip to maintain a straight, rigid structure.",
        outroTitle: "Analysis Complete",
        outroText: "Notice the flips! Humans don't have the enzymes to break those Beta bonds, which is why cellulose passes right through us as dietary fiber.",
        setup: () => {
            monomers = []; bonds = [];
            for(let i=0; i<8; i++) monomers.push(new Monomer(i, 'glucose', Math.random()*width, Math.random()*(height-200)));
            currentLevelData = { type: 'alternating', target: 5, linked: 0, chain: [] };
        }
    },
    {
        title: "Proteins: The Laborers",
        subtitle: "Primary & Tertiary Structure",
        introTitle: "Pre-Lab Briefing: Proteins",
        introText: "<p><strong>Structure:</strong> Proteins start as a linear sequence of amino acids (Primary structure). But to do their job, they must fold into complex 3D shapes (Tertiary structure) based on the chemistry of their side chains.</p><br><p><strong>Function:</strong> A protein's shape dictates its exact function. Enzymes have precise 'active sites' to catch molecules. If a protein loses its shape (denatures), it is completely useless!</p>",
        dialogue: "Link Amino Acids via peptide bonds to form the primary structure. Then, we will fold it!",
        secondaryTitle: "Secondary Structure",
        secondaryText: "<p>The chain begins to coil and fold due to <strong>Hydrogen Bonds</strong> forming along the backbone.</p><br><p>This creates shapes like the <strong>Alpha Helix</strong> (which you just saw) or the Beta Pleated Sheet.</p>",
        tertiaryTitle: "Tertiary Structure",
        tertiaryText: "<p>The 3D shape is locked in! This final, functional shape is formed by the interactions of the amino acid side chains (R-groups).</p>",
        denatureTitle: "Denaturation (Heat)",
        denatureText: "<p>When exposed to high heat, the delicate hydrogen bonds and R-group interactions break. The protein unfolds and loses its shape.</p><br><p class='text-red-400 font-bold'>Loss of shape means loss of function!</p><p>The peptide bonds remain, but the protein is permanently broken.</p>",
        setup: () => {
            monomers = []; bonds = [];
            for(let i=0; i<15; i++) monomers.push(new Monomer(i, 'amino', Math.random()*width, Math.random()*(height-200)));
            currentLevelData = { type: 'protein_build', target: 6, linked: 0, chain: [] };
        }
    }
];

// --- LEARNING MODE LOGIC ---

function showMenu() {
    gameMode = 'MENU';
    uiLayer.classList.add('hidden');
    infoModal.classList.add('hidden');
    arcadeUI.classList.add('hidden');
    mainMenu.classList.remove('hidden');
    
    if (arcadeUnlocked) {
        btnStartArcade.disabled = false;
        btnStartArcade.classList.remove('bg-slate-600', 'text-slate-400');
        btnStartArcade.classList.add('bg-blue-600', 'hover:bg-blue-500', 'text-white');
        arcadeLockMsg.classList.add('hidden');
    }
}

btnMenuReturn.addEventListener('click', showMenu);
btnStartLearn.addEventListener('click', () => {
    mainMenu.classList.add('hidden');
    uiLayer.classList.remove('hidden');
    gameState = 0;
    startLearningLevel(gameState, true);
});

function showInfoModal(title, text, isIntro) {
    gameMode = 'LEARN_INFO';
    infoTitle.innerText = title;
    infoContent.innerHTML = text;
    infoModal.classList.remove('hidden');
    
    btnInfoContinue.onclick = () => {
        infoModal.classList.add('hidden');
        if (isIntro) {
            gameMode = 'LEARN_PLAY';
        } else {
            // Level complete, move to next
            gameState++;
            if (gameState >= LEVELS.length) {
                completeLearningLab();
            } else {
                startLearningLevel(gameState, true);
            }
        }
    };
}

function startLearningLevel(index, showIntro) {
    const lvl = LEVELS[index];
    levelTitle.innerText = lvl.title;
    levelSubtitle.innerText = lvl.subtitle;
    dialogueText.innerText = lvl.dialogue;
    centerControls.classList.add('hidden');
    
    // Reset button classes to default colors in case they were changed
    btnAction1.className = "bg-purple-600 hover:bg-purple-500 text-white px-6 py-3 rounded-full font-bold shadow-[0_0_15px_rgba(147,51,234,0.5)]";
    btnAction2.className = "bg-blue-600 hover:bg-blue-500 text-white px-6 py-3 rounded-full font-bold shadow-[0_0_15px_rgba(37,99,235,0.5)]";

    lvl.setup();
    
    if (showIntro) {
        showInfoModal(lvl.introTitle, lvl.introText, true);
    } else {
        gameMode = 'LEARN_PLAY';
    }
}

function completeLearningLab() {
    arcadeUnlocked = true;
    showInfoModal("Lab Certified!", "<p>You have mastered Anabolism, Catabolism, and the connection between Structure and Function.</p><br><p class='text-green-400 font-bold'>ARCADE MODE UNLOCKED: Hydrolysis Hero!</p>", false);
    btnInfoContinue.onclick = showMenu;
}

function spawnParticles(x, y, text, color, count=10) {
    if (text) particles.push(new Particle(x, y - 20, text, color, 0, -2, 60));
    for(let i=0; i<count; i++) particles.push(new Particle(x, y, null, color, (Math.random()-0.5)*5, (Math.random()-0.5)*5, 30 + Math.random()*20));
}

function handleLearnClick(mx, my) {
    let type = currentLevelData.type;
    if (type === 'linear' || type === 'alternating' || type === 'protein_build') {
        let clicked = monomers.find(m => !m.isLinked && Math.hypot(m.x - mx, m.y - my) < m.radius);
        if (clicked) {
            let chain = currentLevelData.chain;
            clicked.isLinked = true; chain.push(clicked); currentLevelData.linked++;
            
            let startX = width/2 - (currentLevelData.target * (clicked.radius*2)) / 2;
            clicked.tx = startX + (chain.length-1) * (clicked.radius * 2.2);
            clicked.ty = height/2;

            if (type === 'alternating' && chain.length % 2 === 0) clicked.flipped = true;

            if (chain.length > 1) {
                let prev = chain[chain.length-2];
                bonds.push({ m1: prev, m2: clicked, type: type === 'protein_build' ? 'peptide' : 'alpha' });
                let bx = (prev.tx + clicked.tx)/2;
                spawnParticles(bx, height/2, "H₂O Lost!", "#3b82f6", 15);
            }

            if (currentLevelData.linked >= currentLevelData.target) {
                if (type === 'protein_build') {
                    // Trigger protein folding sequence before finishing
                    setTimeout(triggerFolding, 1000);
                } else {
                    setTimeout(() => showInfoModal(LEVELS[gameState].outroTitle, LEVELS[gameState].outroText, false), 1500);
                }
            }
        }
    } else if (type === 'branch') {
        let clicked = monomers.find(m => !m.isLinked && Math.hypot(m.x - mx, m.y - my) < m.radius);
        if (clicked) {
            clicked.isLinked = true; currentLevelData.linked++;
            let targetBase = currentLevelData.baseChain[currentLevelData.linked % currentLevelData.baseChain.length];
            clicked.tx = targetBase.tx; clicked.ty = targetBase.ty - 60; 
            bonds.push({ m1: targetBase, m2: clicked, type: 'branch' });
            spawnParticles(clicked.tx, clicked.ty + 30, "H₂O Lost!", "#3b82f6", 15);

            if (currentLevelData.linked >= currentLevelData.target) {
                setTimeout(() => showInfoModal(LEVELS[gameState].outroTitle, LEVELS[gameState].outroText, false), 1500);
            }
        }
    }
}

function triggerFolding() {
    dialogueText.innerText = "Primary structure complete! Next up: Secondary Structure.";
    centerControls.classList.remove('hidden');
    btnAction1.classList.remove('hidden');
    btnAction2.classList.add('hidden'); // Hide the tertiary button for now
    btnAction1.innerText = "Form Alpha Helix";
    
    btnAction1.onclick = () => {
        isAnimating = true; centerControls.classList.add('hidden');
        dialogueText.innerText = "Hydrogen bonds forming Alpha Helix...";
        monomers.forEach((m, index) => {
            m.tx = width/2 + Math.cos(index * 0.8) * 50 + (index * 15) - 100;
            m.ty = height/2 + Math.sin(index * 0.8) * 50;
        });
        setTimeout(() => {
            isAnimating = false;
            // Show modal for secondary structure
            showInfoModal(LEVELS[gameState].secondaryTitle, LEVELS[gameState].secondaryText, true);
            
            // Override the default continue behavior to trigger tertiary phase instead of finishing
            btnInfoContinue.onclick = () => {
                infoModal.classList.add('hidden');
                gameMode = 'LEARN_PLAY';
                triggerTertiaryFolding();
            };
        }, 2000);
    };
}

function triggerTertiaryFolding() {
    dialogueText.innerText = "Now for Tertiary Structure: R-groups interact to fold into a final 3D shape!";
    centerControls.classList.remove('hidden');
    btnAction1.classList.add('hidden');
    btnAction2.classList.remove('hidden');
    btnAction2.innerText = "Fold to 3D Globular";
    
    btnAction2.onclick = () => {
        isAnimating = true; centerControls.classList.add('hidden');
        dialogueText.innerText = "Hydrophobic/Hydrophilic interactions folding protein...";
        monomers.forEach((m, index) => {
            m.tx = width/2 + Math.cos(index * 2.4) * ((index%3===0)?20:70);
            m.ty = height/2 + Math.sin(index * 2.4) * ((index%3===0)?20:70);
        });
        setTimeout(() => {
            isAnimating = false;
            // Show tertiary modal and set up transition to denaturation phase
            showInfoModal(LEVELS[gameState].tertiaryTitle, LEVELS[gameState].tertiaryText, true);
            
            btnInfoContinue.onclick = () => {
                infoModal.classList.add('hidden');
                gameMode = 'LEARN_PLAY';
                triggerDenaturation();
            };
        }, 2000);
    };
}

function triggerDenaturation() {
    dialogueText.innerText = "Now, let's see what happens if we apply extreme heat to our functional protein.";
    centerControls.classList.remove('hidden');
    btnAction2.classList.add('hidden');
    btnAction1.classList.remove('hidden');
    btnAction1.innerText = "Apply Heat 🔥";
    btnAction1.className = "bg-red-600 hover:bg-red-500 text-white px-8 py-4 rounded-full font-bold text-xl shadow-[0_0_20px_rgba(220,38,38,0.7)]";
    
    btnAction1.onclick = () => {
        isAnimating = true; centerControls.classList.add('hidden');
        dialogueText.innerText = "WARNING: Extreme kinetic energy breaking the fragile 3D bonds!";
        
        let shakeTicks = 0;
        let shakeInterval = setInterval(() => {
            monomers.forEach((m) => {
                // Jiggle violently
                m.tx += (Math.random() - 0.5) * 50;
                m.ty += (Math.random() - 0.5) * 50;
                if (Math.random() < 0.15) spawnParticles(m.tx, m.ty, null, "#ef4444", 2);
            });
            shakeTicks++;
            
            if (shakeTicks > 50) {
                clearInterval(shakeInterval);
                // Final denatured state: tangled unfolded mess
                monomers.forEach((m, index) => {
                    m.tx = width/2 + (index - 7) * 45 + (Math.random() - 0.5) * 80;
                    m.ty = height/2 + (Math.random() - 0.5) * 120;
                });
                
                setTimeout(() => {
                    isAnimating = false;
                    // Finish the level with the denaturation concept info
                    showInfoModal(LEVELS[gameState].denatureTitle, LEVELS[gameState].denatureText, false);
                }, 1500);
            }
        }, 50);
    };
}

// --- ARCADE MODE: HYDROLYSIS HERO ---

let arcadeScore = 0;
let arcadeLives = 3;
let ship = { x: 0, y: 0, w: 80, h: 50, speed: 8, cooldown: 0 };
let arcadeBullets = [];
let spawnTimer = 0;

btnStartArcade.addEventListener('click', startArcade);
btnQuitArcade.addEventListener('click', showMenu);

function startArcade() {
    gameMode = 'ARCADE';
    mainMenu.classList.add('hidden');
    uiLayer.classList.add('hidden');
    arcadeUI.classList.remove('hidden');
    
    arcadeScore = 0; arcadeLives = 3;
    ship.x = width / 2; ship.y = height - 80;
    arcadeBullets = []; monomers = []; bonds = [];
    spawnTimer = 0;
    
    updateArcadeUI();
}

function updateArcadeUI() {
    arcadeScoreDisplay.innerText = arcadeScore;
    arcadeLivesDisplay.innerText = '⭐'.repeat(Math.max(0, arcadeLives));
    if (arcadeLives <= 0) {
        gameMode = 'GAME_OVER';
        setTimeout(() => {
            showInfoModal("Enzyme Denatured!", `<p>Game Over!</p><p>Final Score: ${arcadeScore}</p><p>Too many polymers slipped past your hydrolysis defenses!</p>`, false);
            btnInfoContinue.onclick = showMenu;
        }, 1000);
    }
}

function spawnArcadeEnemy() {
    // Spawn a chain of 3-5 glucose at the top
    let len = 3 + Math.floor(Math.random() * 3);
    let startX = 100 + Math.random() * (width - 200);
    
    // Starts slower (0.7) and scales up based on score
    let speed = 0.7 + (arcadeScore / 400); 
    
    let newMonomers = [];
    for(let i=0; i<len; i++) {
        let m = new Monomer(Math.random(), 'glucose', startX + (i*50), -50);
        m.vx = 0; m.vy = speed; m.isLinked = true;
        newMonomers.push(m);
        monomers.push(m);
        if(i > 0) bonds.push({ m1: newMonomers[i-1], m2: newMonomers[i], type: 'alpha', broken: false });
    }
}

function updateArcade() {
    // Ship Movement
    if ((keys.ArrowLeft || keys.a) && ship.x > ship.w/2) ship.x -= ship.speed;
    if ((keys.ArrowRight || keys.d) && ship.x < width - ship.w/2) ship.x += ship.speed;
    
    // Shooting
    if (ship.cooldown > 0) ship.cooldown--;
    if (keys.Space && ship.cooldown === 0) {
        arcadeBullets.push({ x: ship.x, y: ship.y - ship.h/2, vy: -12, radius: 10 });
        ship.cooldown = 15;
    }

    // Move Bullets
    for (let i = arcadeBullets.length - 1; i >= 0; i--) {
        let b = arcadeBullets[i];
        b.y += b.vy;
        if (b.y < 0) { arcadeBullets.splice(i, 1); continue; }
        
        // Bullet vs Bond Collision (Hydrolysis!)
        let hit = false;
        for (let bond of bonds) {
            if (bond.broken) continue;
            let bx = (bond.m1.x + bond.m2.x) / 2;
            let by = (bond.m1.y + bond.m2.y) / 2;
            
            if (Math.hypot(b.x - bx, b.y - by) < 30) {
                bond.broken = true; hit = true;
                bond.m1.vx = -2; bond.m2.vx = 2; // push apart
                
                // Check if monomers are now completely free
                let m1Links = bonds.filter(bo => !bo.broken && (bo.m1===bond.m1 || bo.m2===bond.m1)).length;
                let m2Links = bonds.filter(bo => !bo.broken && (bo.m1===bond.m2 || bo.m2===bond.m2)).length;
                
                if(m1Links === 0) bond.m1.isLinked = false;
                if(m2Links === 0) bond.m2.isLinked = false;

                spawnParticles(bx, by, "+10 (Hydrolysis)", "#06b6d4", 10);
                arcadeScore += 10;
                updateArcadeUI();
                break;
            }
        }
        if (hit) arcadeBullets.splice(i, 1);
    }

    // Move Enemies
    spawnTimer--;
    if (spawnTimer <= 0) {
        spawnArcadeEnemy();
        // Starts with a long delay (160 frames) and gets faster (caps at 30 frames)
        spawnTimer = 160 - Math.min(130, (arcadeScore / 5)); 
    }

    for (let i = monomers.length - 1; i >= 0; i--) {
        let m = monomers[i];
        m.update('ARCADE');
        
        // Check bounds
        if (m.y > height + 50) {
            if (m.isLinked) {
                // Slipped past while still part of a polymer!
                arcadeLives--;
                updateArcadeUI();
                
                // Break all bonds attached to this monomer so we don't count it multiple times
                bonds.forEach(b => { if(!b.broken && (b.m1===m || b.m2===m)) b.broken = true; });
                m.isLinked = false;
                
                // Visual feedback
                document.body.style.backgroundColor = '#450a0a';
                setTimeout(() => document.body.style.backgroundColor = '#0f172a', 100);
            }
            monomers.splice(i, 1);
        }
    }
}

function drawArcadeSpecifics() {
    // Draw Ship (Amylase Enzyme Shape)
    ctx.save();
    ctx.translate(ship.x, ship.y);
    ctx.fillStyle = '#eab308'; // yellow
    ctx.beginPath();
    ctx.moveTo(-ship.w/2, ship.h/2);
    ctx.lineTo(ship.w/2, ship.h/2);
    ctx.lineTo(ship.w/2, -ship.h/4);
    // the active site (cleft)
    ctx.lineTo(10, -ship.h/4);
    ctx.lineTo(0, -ship.h/2 - 10);
    ctx.lineTo(-10, -ship.h/4);
    ctx.lineTo(-ship.w/2, -ship.h/4);
    ctx.closePath();
    ctx.fill();
    ctx.lineWidth = 3; ctx.strokeStyle = '#ca8a04'; ctx.stroke();
    ctx.fillStyle = 'black'; ctx.font = 'bold 12px Arial'; ctx.textAlign = 'center';
    ctx.fillText('AMYLASE', 0, ship.h/4);
    ctx.restore();

    // Draw Bullets (Water molecules)
    for (let b of arcadeBullets) {
        ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, Math.PI*2);
        ctx.fillStyle = '#3b82f6'; ctx.fill();
        ctx.fillStyle = 'white'; ctx.font = '10px Arial'; ctx.textAlign = 'center'; ctx.textBaseline='middle';
        ctx.fillText('H₂O', b.x, b.y);
    }
}


// --- MAIN LOOP ---

function draw() {
    ctx.fillStyle = '#0f172a';
    ctx.fillRect(0, 0, width, height);

    if (gameMode === 'LEARN_PLAY' || gameMode === 'LEARN_INFO') {
        // Draw Bonds
        ctx.lineWidth = 4;
        for (let b of bonds) {
            if (b.broken) continue;
            ctx.beginPath(); ctx.moveTo(b.m1.x, b.m1.y); ctx.lineTo(b.m2.x, b.m2.y);
            ctx.strokeStyle = (b.type === 'peptide') ? '#a855f7' : (b.type === 'branch' ? '#f59e0b' : '#3b82f6');
            ctx.stroke();
        }
        for (let m of monomers) { m.update('LEARN_PLAY'); m.draw(ctx); }
    } 
    else if (gameMode === 'ARCADE' || gameMode === 'GAME_OVER') {
        if(gameMode === 'ARCADE') updateArcade();
        
        ctx.lineWidth = 4;
        for (let b of bonds) {
            if (b.broken) continue;
            ctx.beginPath(); ctx.moveTo(b.m1.x, b.m1.y); ctx.lineTo(b.m2.x, b.m2.y);
            ctx.strokeStyle = '#ef4444'; // Red bonds to target
            ctx.stroke();
            // Pulse effect
            ctx.globalAlpha = 0.5 + Math.sin(Date.now()/100)*0.5;
            ctx.strokeStyle = '#fca5a5'; ctx.stroke(); ctx.globalAlpha = 1.0;
        }
        for (let m of monomers) { m.draw(ctx); }
        drawArcadeSpecifics();
    }

    // Draw Particles (Always on top)
    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i]; p.update(); p.draw(ctx);
        if (p.life <= 0) particles.splice(i, 1);
    }

    requestAnimationFrame(draw);
}

// Initialize
showMenu();
draw();

</script>
